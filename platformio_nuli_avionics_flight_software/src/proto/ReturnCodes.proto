syntax = "proto3";

import "nanopb.proto";

enum ReturnCode {
  SUCCESS = 0;
  UNKNOWN = -1;

  // NULI Packets
  NULIPACKET_INVALID_START_FLAG = -2;
  NULIPACKET_INVALID_STOP_FLAG = -3;
  NULIPACKET_INVALID_CRC = -4;
  NULIPACKET_NANOPB_DECODE_ERROR = -5;
  NULIPACKET_DECODING_ERROR = -6;
  NULIPACKET_ENCODING_ERROR = -7;
}